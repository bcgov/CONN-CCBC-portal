# This workflow contains zap scanning
name: test-zap
permissions: write-all

on:
  workflow_call:

concurrency:
  group: test-zap-${{ github.ref }}
  cancel-in-progress: true

env:
  PGUSER: postgres

jobs:
  zap-owasp-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6
      # - name: dev env setup
      #   uses: ./.github/actions/dev-env-setup
      - name: run app locally
        uses: ./.github/actions/local-app-run
      # zaproxy image: manifest list digest for ghcr.io/zaproxy/zaproxy:latest (2026-03-25); verify: docker buildx imagetools inspect ghcr.io/zaproxy/zaproxy:latest
      - name: ZAP Full Scan
        uses: Wandalen/wretry.action@e94c43bf2e865e7dbbd90b0c1061053f5888932a # branch=master
        with:
          action: zaproxy/action-full-scan@75ee1686750ab1511a73b26b77a2aedd295053ed # tag=v0.12.0
          with: |
            token: ${{ secrets.GITHUB_TOKEN }}
            docker_name: 'ghcr.io/zaproxy/zaproxy@sha256:c4da4c234258d444d9988fce9d034b00323724818daa4c91ca46f09aa04b46db'
            target: 'http://localhost:3000/applicantportal'
            rules_file_name: '.zap/rules.tsv'
            cmd_options: '-a -d -T 5 -m 2 -J ./report_json.json'
            issue_title: OWASP Full Scan
            fail_action: true
          attempt_limit: 3
          attempt_delay: 2000
