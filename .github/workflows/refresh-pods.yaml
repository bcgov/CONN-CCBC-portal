# Not used, but kept for future reference
name: Refresh pods

on:
  workflow_call:
    secrets:
      OPENSHIFT_SERVER: { required: true }
      OPENSHIFT_TOKEN: { required: true }
      OPENSHIFT_APP_NAMESPACE: { required: true }

jobs:
  refresh-dev:
    runs-on: ubuntu-latest
    environment:
      name: development
    steps:
      - name: Install OpenShift CLI (oc)
        uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82 # tag=v1
        with:
          oc: latest
      - name: Authenticate, set context and run deploy script
        uses: redhat-actions/oc-login@5eb45e848b168b6bf6b8fe7f1561003c12e3c99d # tag=v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          openshift_app_namespace: ${{ secrets.OPENSHIFT_APP_NAMESPACE }}
          namespace: ${{ secrets.OPENSHIFT_APP_NAMESPACE }}
          insecure_skip_tls_verify: true
      - name: Restart rollout
        run: |
          oc rollout restart deployment/ccbc
  refresh-test:
    runs-on: ubuntu-latest
    environment:
      name: test
    steps:
      - name: Install OpenShift CLI (oc)
        uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82 # tag=v1
        with:
          oc: latest
      - name: Authenticate, set context and run deploy script
        uses: redhat-actions/oc-login@5eb45e848b168b6bf6b8fe7f1561003c12e3c99d # tag=v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          openshift_app_namespace: ${{ secrets.OPENSHIFT_APP_NAMESPACE }}
          namespace: ${{ secrets.OPENSHIFT_APP_NAMESPACE }}
          insecure_skip_tls_verify: true
      - name: Restart rollout
        run: |
          oc rollout restart deployment/ccbc
  refresh-prod:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Install OpenShift CLI (oc)
        uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82 # tag=v1
        with:
          oc: latest
      - name: Authenticate, set context and run deploy script
        uses: redhat-actions/oc-login@5eb45e848b168b6bf6b8fe7f1561003c12e3c99d # tag=v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          openshift_app_namespace: ${{ secrets.OPENSHIFT_APP_NAMESPACE }}
          namespace: ${{ secrets.OPENSHIFT_APP_NAMESPACE }}
          insecure_skip_tls_verify: true
      - name: Restart rollout
        run: |
          oc rollout restart deployment/ccbc
