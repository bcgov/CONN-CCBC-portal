# Builds the docker containers
name: build

on:
  workflow_call:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  GIT_HASH: ${{ github.sha }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # build app image on every push
          - image: ghcr.io/bcgov/conn-ccbc-portal/ccbc-app
            context: .
            dockerfile: app/Dockerfile
            name: app
            build_only_on_main: false
          # build db image only on main, helper image, does not change
          # will use cache from registry
          - image: ghcr.io/bcgov/conn-ccbc-portal/ccbc-db
            context: .
            dockerfile: db/Dockerfile
            name: db
            build_only_on_main: false
          # build shp image only on main, cron image, does not change
          # will use cache from registry
          - image: ghcr.io/bcgov/conn-ccbc-portal/ccbc-cron-shp
            context: .
            dockerfile: cron/shp/Dockerfile
            name: cron-shp
            build_only_on_main: false
          # build unit test db only on main, testing image, does not change
          # will use cache from registry
          - image: ghcr.io/bcgov/conn-ccbc-portal/ccbc-unit-test-db
            context: .
            dockerfile: local_setup/unit_tests/Dockerfile
            name: db-unit-test
            build_only_on_main: false
          - image: ghcr.io/bcgov/conn-ccbc-portal/conn-ticket-queue
            context: .
            dockerfile: conn-ticket-queue/Dockerfile
            name: conn-ticket-queue
            build_only_on_main: false
    permissions:
      contents: read
      actions: read
      packages: write
    name: ${{ matrix.name }}
    steps:
      - name: Debug last successful build run for PR
        if: ${{ github.event_name == 'pull_request' && matrix.name == 'app' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # tag=v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No PR context; skipping last successful run lookup.');
              return;
            }

            const workflowId = 'build.yaml';
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              event: 'pull_request',
              per_page: 50
            });

            const matchingRuns = runs.data.workflow_runs.filter((run) =>
              run.conclusion === 'success' &&
              run.pull_requests?.some((p) => p.number === pr.number)
            );

            const last = matchingRuns[0];
            if (!last) {
              core.info(`No successful ${workflowId} runs found for PR #${pr.number}.`);
              return;
            }

            core.info(`Last successful ${workflowId} run for PR #${pr.number}:`);
            core.info(`- run id: ${last.id}`);
            core.info(`- head sha: ${last.head_sha}`);
            core.info(`- updated at: ${last.updated_at}`);
            core.info(`- html url: ${last.html_url}`);

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # tag=v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # tag=v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # tag=v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,format=long,prefix=sha-
            latest
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # tag=v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ matrix.build_only_on_main != true || github.ref == 'refs/heads/main' || matrix.name == 'app' }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # tag=v7
        with:
          context: ${{ matrix.context }}
          # builder: ${{ steps.buildx.outputs.name }}
          push: true
          file: ${{ matrix.dockerfile }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          # cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max
          # cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}:buildcache,mode=max', matrix.image) || '' }}
        # Temp fix
        # https://github.com/docker/build-push-action/issues/252
        # https://github.com/moby/buildkit/issues/1896
      # - name: Move cache
      #   run: |
      #     rm -rf /tmp/.buildx-cache
      #     mv /tmp/.buildx-cache-new /tmp/.buildx-cache
