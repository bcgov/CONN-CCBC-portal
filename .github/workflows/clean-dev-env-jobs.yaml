name: clean-dev-env-jobs

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      OPENSHIFT_TOKEN: { required: true }
      OPENSHIFT_APP_NAMESPACE: { required: true }
      OPENSHIFT_SERVER: { required: true }

jobs:
  clean-dev-env-jobs:
    runs-on: ubuntu-latest
    environment:
      name: development
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag=v6
      - name: Install OpenShift CLI (oc)
        uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82 # tag=v1
        with:
          oc: latest
      - name: Authenticate with OpenShift
        uses: redhat-actions/oc-login@5eb45e848b168b6bf6b8fe7f1561003c12e3c99d # tag=v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
      - name: Clean dev environment lingering completed jobs
        run: |
          chmod +x ./lib/clean_dev.sh
          ./lib/clean_dev.sh ${{ secrets.OPENSHIFT_APP_NAMESPACE }}
