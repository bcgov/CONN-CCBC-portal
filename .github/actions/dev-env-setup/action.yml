name: 'Set up CCBC dev environment'
description: 'Sets up asdf, perl and configures the cache'
runs:
  using: composite
  steps:
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # tag=v4
      id: yarn-cache
      with:
        path: |
          ~/.cache/yarn
          ~/.cache/Cypress
          ./app/node_modules
        key: ${{ runner.os }}-yarn-cache-${{ hashFiles('app/yarn.lock') }}-v2
